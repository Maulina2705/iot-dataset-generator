<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>

.bg {
  fill: #050816;
}

.line {
  stroke: #00CFFF;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 12;
  animation: flow 4s linear infinite;
}

.node {
  fill: #0B1220;
  stroke: #111827;
  stroke-width: 2;
}

.glow {
  fill: #00CFFF;
  filter: drop-shadow(0 0 14px #00CFFF);
}

.title {
  fill: white;
  font-size: 18px;
  font-family: Arial, sans-serif;
  font-weight: bold;
}

.subtitle {
  fill: #94A3B8;
  font-size: 12px;
  font-family: Arial, sans-serif;
}

.small {
  fill: #00CFFF;
  font-size: 16px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  letter-spacing: 1px;
}

.telemetry {
  fill: #7B61FF;
  filter: drop-shadow(0 0 16px #7B61FF);
  animation: telemetryMove 6s linear infinite;
}

@keyframes telemetryMove {

  0% {
    transform: translateX(0px);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  90% {
    opacity: 1;
  }

  100% {
    transform: translateX(1080px);
    opacity: 0;
  }

} 

@keyframes flow {
  from {
    stroke-dashoffset: 24;
  }

  to {
    stroke-dashoffset: 0;
  }
}



</style>

<rect width="100%" height="100%" class="bg"/>

<!-- MAIN LINE -->
<line x1="120" y1="210" x2="1280" y2="210" class="line"/>

<!-- NODE 1 -->
<circle cx="170" cy="210" r="28" class="glow"/>
<text x="90" y="120" class="title">Simulation Preset</text>
<text x="90" y="145" class="subtitle">Controls operational scenarios</text>
<text x="145" y="260" class="small">PRESET</text>

<!-- NODE 2 -->
<circle cx="360" cy="210" r="28" class="glow"/>
<text x="280" y="320" class="title">Telemetry Engine</text>
<text x="250" y="345" class="subtitle">Realtime telemetry simulation</text>
<text x="330" y="170" class="small">ENGINE</text>

<!-- NODE 3 -->
<circle cx="550" cy="210" r="28" class="glow"/>
<text x="460" y="120" class="title">System Update</text>
<text x="440" y="145" class="subtitle">Contextual operational changes</text>
<text x="520" y="260" class="small">SYNC</text>

<!-- NODE 4 -->
<circle cx="740" cy="210" r="28" class="glow"/>
<text x="650" y="320" class="title">Activity & Logs</text>
<text x="620" y="345" class="subtitle">Persistent operational feedback</text>
<text x="710" y="170" class="small">LOGS</text>

<!-- NODE 5 -->
<circle cx="930" cy="210" r="28" class="glow"/>
<text x="840" y="120" class="title">Anomaly Detection</text>
<text x="810" y="145" class="subtitle">Operational inconsistency scan</text>
<text x="900" y="260" class="small">ALERT</text>

<!-- NODE 6 -->
<circle cx="1120" cy="210" r="28" class="glow"/>
<text x="1030" y="320" class="title">Dataset Engine</text>
<text x="1010" y="345" class="subtitle">Telemetry memory generation</text>
<text x="1090" y="170" class="small">MEMORY</text>

<!-- EXPORT -->
<circle cx="1280" cy="210" r="24" fill="#7B61FF"/>
<text x="1235" y="120" class="title">Export Pipeline</text>
<text x="1215" y="145" class="subtitle">JSON / CSV generation</text>

<circle cx="170" cy="210" r="9" class="telemetry"/>

</svg>