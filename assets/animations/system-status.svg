<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>

.background {
  fill: #09111F;
}

.title {
  fill: #E6F1FF;
  font-family: 'Courier New', monospace;
  font-size: 18px;
  font-weight: bold;
}

.text {
  fill: #E6F1FF;
  font-family: 'Courier New', monospace;
  font-size: 16px;
}

.live {
  fill: #00FFB2;
  animation: blink 1.2s infinite;
}

.ok {
  fill: #00CFFF;
}

.warn {
  fill: #FF5A7A;
  animation: pulse 1.5s infinite;
}

.glow {
  filter: drop-shadow(0 0 6px currentColor);
}

@keyframes blink {
  50% {
    opacity: 0.3;
  }
}

@keyframes pulse {
  0% {
    opacity: 0.5;
  }

  50% {
    opacity: 1;
  }

  100% {
    opacity: 0.5;
  }
}

.telemetry-dot {
  fill: #00CFFF;
  animation: telemetry 3s linear infinite;
}

@keyframes telemetry {
  0% {
    transform: translateX(-20px);
    opacity: 0;
  }

  30% {
    opacity: 1;
  }

  100% {
    transform: translateX(760px);
    opacity: 0;
  }
}

</style>

<rect width="100%" height="100%" rx="14" class="background"/>

<text x="40" y="40" class="title">STATUS</text>
<text x="240" y="40" class="title">MODULE</text>
<text x="620" y="40" class="title">CONDITION</text>

<circle cx="60" cy="75" r="6" class="live glow"/>
<text x="80" y="80" class="text">[ LIVE ]</text>
<text x="240" y="80" class="text">Telemetry Stream</text>
<text x="620" y="80" class="text live">SYNCHRONIZED</text>

<circle cx="60" cy="110" r="6" class="ok glow"/>
<text x="80" y="115" class="text">[ OK ]</text>
<text x="240" y="115" class="text">Environment Engine</text>
<text x="620" y="115" class="text ok">STABLE</text>

<circle cx="60" cy="145" r="6" class="warn glow"/>
<text x="80" y="150" class="text">[ WARN ]</text>
<text x="240" y="150" class="text">Occupancy Simulation</text>
<text x="620" y="150" class="text warn">FLUCTUATING</text>

<circle cx="150" cy="165" r="3" class="telemetry-dot"/>

</svg>