<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>

.bg {
  fill: #050816;
}

.card {
  fill: #0B1220;
  stroke: #111827;
  stroke-width: 2;
  rx: 16;
}

.title {
  fill: white;
  font-size: 20px;
  font-family: Arial, sans-serif;
  font-weight: bold;
}

.subtitle {
  fill: #94A3B8;
  font-size: 13px;
  font-family: Arial, sans-serif;
}

.line {
  stroke: #00CFFF;
  stroke-width: 3;
  stroke-dasharray: 10;
  animation: flow 2s linear infinite;
}

.pulse {
  fill: #00CFFF;
  filter: drop-shadow(0 0 12px #00CFFF);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes flow {
  from {
    stroke-dashoffset: 20;
  }
  to {
    stroke-dashoffset: 0;
  }
}

@keyframes pulse {

  0% {
    opacity: 0.3;
  }

  50% {
    opacity: 1;
  }

  100% {
    opacity: 0.3;
  }

}

</style>

<rect width="100%" height="100%" class="bg"/>

<!-- CARD 1 -->
<rect x="40" y="80" width="180" height="90" class="card"/>
<text x="65" y="115" class="title">Preset Layer</text>
<text x="65" y="140" class="subtitle">Operational simulation presets</text>

<!-- CARD 2 -->
<rect x="300" y="80" width="180" height="90" class="card"/>
<text x="325" y="115" class="title">Telemetry</text>
<text x="325" y="140" class="subtitle">Realtime telemetry engine</text>

<!-- CARD 3 -->
<rect x="560" y="80" width="180" height="90" class="card"/>
<text x="580" y="115" class="title">Synchronization</text>
<text x="580" y="140" class="subtitle">Contextual operational flow</text>

<!-- CARD 4 -->
<rect x="820" y="80" width="180" height="90" class="card"/>
<text x="855" y="115" class="title">Dataset Engine</text>
<text x="855" y="140" class="subtitle">Telemetry memory system</text>

<!-- FLOW LINES -->

<line x1="220" y1="125" x2="300" y2="125" class="line"/>
<circle cx="260" cy="125" r="5" class="pulse"/>

<line x1="480" y1="125" x2="560" y2="125" class="line"/>
<circle cx="520" cy="125" r="5" class="pulse"/>

<line x1="740" y1="125" x2="820" y2="125" class="line"/>
<circle cx="780" cy="125" r="5" class="pulse"/>

</svg>