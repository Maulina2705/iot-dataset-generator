<svg width="800" height="60" viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">

<style>

.line {
  stroke: #00CFFF;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 12;
  animation: flow 2s linear infinite;
}

.pulse {
  fill: #00CFFF;
  filter: drop-shadow(0 0 8px #00CFFF);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes flow {
  from {
    stroke-dashoffset: 24;
  }
  to {
    stroke-dashoffset: 0;
  }
}

@keyframes pulse {
  0% {
    opacity: 0.4;
    transform: scale(1);
  }

  50% {
    opacity: 1;
    transform: scale(1.3);
  }

  100% {
    opacity: 0.4;
    transform: scale(1);
  }
}

</style>

<line x1="100" y1="30" x2="700" y2="30" class="line"/>

<circle cx="400" cy="30" r="6" class="pulse"/>

</svg>