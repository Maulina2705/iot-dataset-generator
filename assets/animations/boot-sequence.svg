<svg fill="none" viewBox="0 0 800 140" width="800" height="140" xmlns="http://www.w3.org/2000/svg">

<style>
.terminal {
  font: 600 18px 'Courier New', monospace;
  fill: #00CFFF;
}

.cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.line1 {
  animation: typing1 4s steps(40, end) forwards;
  white-space: nowrap;
  overflow: hidden;
}

.line2 {
  animation: typing2 4s steps(40, end) forwards;
  animation-delay: 4s;
  opacity: 0;
}

.line3 {
  animation: typing3 4s steps(40, end) forwards;
  animation-delay: 8s;
  opacity: 0;
}

.line4 {
  animation: typing4 3s steps(30, end) forwards;
  animation-delay: 12s;
  opacity: 0;
}

@keyframes typing1 {
  to { opacity: 1; }
}

@keyframes typing2 {
  to { opacity: 1; }
}

@keyframes typing3 {
  to { opacity: 1; }
}

@keyframes typing4 {
  to { opacity: 1; }
}
</style>

<rect width="100%" height="100%" fill="#050816"/>

<text x="30" y="35" class="terminal line1">
Initializing realtime telemetry engine...
</text>

<text x="30" y="65" class="terminal line2">
Loading contextual simulation modules...
</text>

<text x="30" y="95" class="terminal line3">
Synchronizing operational environment...
</text>

<text x="30" y="125" class="terminal line4">
Simulation ready.<tspan class="cursor">▋</tspan>
</text>

</svg>