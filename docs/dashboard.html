<!DOCTYPE html>
<html>
<head>
  <title>IoT Realtime Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f9; }
    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap:15px;
    }
    .card {
      background:white;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>📊 Realtime IoT Dashboard</h1>

<div class="grid">
  <div class="card"><canvas id="tempChart"></canvas></div>
  <div class="card"><canvas id="humChart"></canvas></div>
  <div class="card"><canvas id="powerChart"></canvas></div>
</div>

<script>
let charts = {};

function buildChart(id, label) {
  let ctx = document.getElementById(id).getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{ label, data: [] }] }
  });
}

charts.temp = buildChart("tempChart", "Temperature");
charts.hum = buildChart("humChart", "Humidity");
charts.power = buildChart("powerChart", "Total Power");

// fetch data tiap 2 detik
async function fetchData() {
  try {
    let res = await fetch("http://localhost:3000/data");
    let data = await res.json();

    let labels = data.map(d => d.timestamp.slice(11,19));

    charts.temp.data.labels = labels;
    charts.temp.data.datasets[0].data = data.map(d => d.temperature);

    charts.hum.data.labels = labels;
    charts.hum.data.datasets[0].data = data.map(d => d.humidity);

    charts.power.data.labels = labels;
    charts.power.data.datasets[0].data = data.map(d => d.total_power);

    Object.values(charts).forEach(c => c.update());

  } catch(e) {
    console.error("Fetch error", e);
  }
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
