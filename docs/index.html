<!DOCTYPE html>
<html>
<head>
  <title>IoT Dataset Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>🚀 IoT Dataset Generator</h1>
  <p>Generate realistic IoT sensor data (temperature, humidity, motion)</p>

  <h3>⚙️ Controls</h3>
  <div class="panel">
    <label>Data Points: <span id="dataCountLabel">100</span></label><br>
    <input type="range" id="dataCount" min="50" max="500" value="100">

    <br><br>

    <label>Number of Devices:</label><br>
    <input type="number" id="deviceCount" value="3" min="1" max="10">

    <br><br>

    <label>
      <input type="checkbox" id="anomalyToggle" checked>
      Enable Anomaly
    </label>
  </div>

  <div class="controls">
    <button onclick="generateData()">Generate Data</button>
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="downloadJSON()">Download JSON</button>
  </div>

  <h3>📊 Temperature Chart</h3>
  <canvas id="chart"></canvas>

  <h3>📦 Output</h3>
  <pre id="output"></pre>

  <script src="script.js"></script>
</body>
</html>
