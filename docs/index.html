<!DOCTYPE html>
<html>
<head>
  <title>IoT Dataset Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
</head>

<body>

  <h1>🚀 IoT Dataset Generator Dashboard</h1>

  <h3>⚙️ Controls</h3>
  
  <div class="panel">
    <label>Data Points: <span id="dataCountLabel">100</span></label><br>
    <input type="range" id="dataCount" min="50" max="500" value="100">

    <br><br>

    <label>Number of Devices:</label><br>
    <input type="number" id="deviceCount" value="3">

    <br><br>

    <label><input type="checkbox" id="anomalyToggle" checked> Enable Anomaly</label><br>
    <label><input type="checkbox" id="showAnomaly" checked> Show Anomaly</label>
  </div>

  <div class="panel">
    <h4>📡 Streaming</h4>
    <p>Status: <span id="status" style="color:red;">Stopped</span></p>
    <p>Data Count: <span id="liveCount">0</span></p>

    <label>Speed:</label><br>
    <select id="intervalSelect">
      <option value="500">Fast</option>
      <option value="1000" selected>Normal</option>
      <option value="2000">Slow</option>
    </select>

    <br><br>

    <label>Resolution:</label><br>
    <label><input type="radio" name="resolution" value="second" checked> Detik</label>
    <label><input type="radio" name="resolution" value="minute"> Menit</label>
    <label><input type="radio" name="resolution" value="hour"> Jam</label>
  </div>

  <div class="controls">
    <button onclick="generateData()">Generate Data</button>
    <button onclick="startStreaming()">▶ Start</button>
    <button onclick="stopStreaming()">⏹ Stop</button>
    <button onclick="downloadCSV()">Download CSV</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Temperature</h3>
      <canvas id="tempChart"></canvas>
    </div>
    <div class="card">
      <h3>Humidity</h3>
      <canvas id="humChart"></canvas>
    </div>
    <div class="card">
      <h3>Motion</h3>
      <canvas id="motionChart"></canvas>
    </div>
  </div>

  <pre id="output"></pre>

</body>
</html>
