<!DOCTYPE html>
<html>
<head>
  <title>IoT Dataset Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
</head>

<body>

  <h1>🚀 IoT Dataset Generator Dashboard</h1>

  <div class="panel">
    <label>Generate Rows:</label><br>
    <input type="number" id="generateCount" value="200" min="10" max="10000">

    <br><br>

    <label>Speed:</label><br>
    <select id="intervalSelect">
      <option value="500">Fast</option>
      <option value="1000" selected>Normal</option>
      <option value="2000">Slow</option>
    </select>

    <br><br>

    <label>Resolution:</label><br>
    <label><input type="radio" name="resolution" value="second" checked> Detik</label>
    <label><input type="radio" name="resolution" value="minute"> Menit</label>
    <label><input type="radio" name="resolution" value="hour"> Jam</label>
  </div>

  <div class="controls">
    <button onclick="generateData()">Generate Data</button>
    <button onclick="startStreaming()">▶ Start</button>
    <button onclick="stopStreaming()">⏹ Stop</button>
    <button onclick="downloadCSV()">Download CSV</button>
  </div>

  <div class="panel">
    Status: <span id="status" style="color:red;">Stopped</span><br>
    Data Count: <span id="liveCount">0</span>
  </div>

  <div class="grid">
    <div class="card"><canvas id="tempChart"></canvas></div>
    <div class="card"><canvas id="humChart"></canvas></div>
    <div class="card"><canvas id="motionChart"></canvas></div>
  </div>

</body>
</html>
